<script id="refdata" type="application/json">{"meta": {"schemaVersion": "1.0", "title": "Java Reference", "subtitle": "Foundations to Expert · Java 25 LTS", "renderNote": "Canonical source. HTML and PDF are generated FROM this file. Edit here, regenerate both. Never edit the outputs directly.", "typeVocabulary": {"concept": "A mechanism or idea — how something works and why.", "syntax": "A concrete form, keyword, or tool invocation."}, "provenance": {"verified": "Drawn from the learner's actual completed lessons: runtime/toolchain, the Strings cluster, Operators & Conversion, Console I/O, and Dates & Times -- each verified in-session against a real JDK 21/25 compiler, not reconstructed.", "representative": "Correct Java, but reconstructed generically — confirm it matches what was actually taught, then I swap in the real breakdown."}}, "topicAreas": [{"id": "runtime", "name": "Language & Runtime", "glance": "Java source is compiled once into platform-neutral bytecode, then run on any machine by the JVM. Two tools bracket the process: javac compiles, java launches. Knowing which tool does which step — and that the JVM, not the compiler, produces the final machine code — is the foundation everything else sits on.", "entries": [{"term": "How Java runs", "aliases": ["compile", "compilation", "run", "execution model", "write once run anywhere", "wora"], "type": "concept", "essence": "Java source is compiled to platform-neutral bytecode, which the JVM then executes at run time — so the same compiled program runs on any machine with a JVM.", "detail": [{"label": "Mechanism", "body": "javac turns Foo.java into Foo.class (bytecode, not machine code). java starts the JVM, which loads that bytecode and — via JIT compilation and interpretation — turns it into native machine code as the program runs."}, {"label": "Why", "body": "The bytecode layer is the portability seam: compile once, and any operating system with a JVM can run the result. That is the whole 'write once, run anywhere' claim, made concrete."}, {"label": "Example", "code": "javac Hello.java   # source  -> Hello.class (bytecode)\njava Hello         # JVM loads bytecode -> runs it"}], "source": {"label": "JLS SE 25", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/index.html"}, "related": ["javac", "java", "bytecode", "JDK vs JRE vs JVM"]}, {"term": "javac", "aliases": ["compiler", "compile command"], "type": "syntax", "essence": "The compiler. It reads a .java source file and produces a .class bytecode file.", "detail": [{"label": "Form", "body": "javac takes the full file name, extension included."}, {"label": "Example", "code": "javac Hello.java   # requires the .java extension\n# produces: Hello.class"}], "source": {"label": "JLS SE 25", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/index.html"}, "related": ["java", "How Java runs", "bytecode"]}, {"term": "java", "aliases": ["launcher", "run command", "jvm launcher"], "type": "syntax", "essence": "The launcher. It starts the JVM on a compiled class and runs its main method.", "detail": [{"label": "Form", "body": "java takes the class NAME only — no .java, no .class extension."}, {"label": "Mechanism", "body": "The final step from bytecode to native machine code happens HERE, inside the JVM — not in javac. javac stops at bytecode."}, {"label": "Example", "code": "java Hello   # bare class name, NO extension\n# NOT: java Hello.class  (wrong)"}], "source": {"label": "JLS SE 25", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/index.html"}, "related": ["javac", "How Java runs", "main method"]}, {"term": "JDK vs JRE vs JVM", "aliases": ["jdk", "jre", "jvm", "java development kit", "runtime environment", "virtual machine"], "type": "concept", "essence": "Three nested layers: the JDK builds programs, the JRE runs them, and the JVM inside it actually executes the bytecode.", "detail": [{"label": "Mechanism", "body": "JDK ⊃ JRE ⊃ JVM. The JDK adds developer tools (javac and friends) on top of the JRE. The JRE bundles the JVM plus the standard libraries. The JVM is the engine that executes bytecode."}, {"label": "Use when", "body": "You need the JDK to write and compile Java. A machine that only runs finished Java programs needs just the runtime."}], "source": {"label": "JLS SE 25", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/index.html"}, "related": ["How Java runs", "javac", "java"]}, {"term": "bytecode", "aliases": ["class file", ".class", "intermediate representation"], "type": "concept", "essence": "Platform-neutral instructions stored in .class files — the JVM's 'machine code', not the CPU's.", "detail": [{"label": "Mechanism", "body": "javac emits bytecode: a compact instruction set the JVM understands. It is not tied to any real processor; the JVM translates it to actual CPU instructions at run time."}, {"label": "Why", "body": "Because bytecode is CPU-independent, one .class file runs unchanged on any JVM — the mechanism behind Java's portability."}], "source": {"label": "JLS SE 25", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/index.html"}, "related": ["How Java runs", "javac", "JDK vs JRE vs JVM"]}, {"term": "main method", "aliases": ["entry point", "public static void main", "String[] args"], "type": "syntax", "provenance": "representative", "essence": "The program's entry point — where the JVM begins execution.", "detail": [{"label": "Form", "code": "public static void main(String[] args) {\n    System.out.println(\"Hello\");\n}"}, {"label": "Mechanism", "body": "public (callable from outside), static (no object needed to start), void (returns nothing), args holds any command-line arguments."}, {"label": "Note", "body": "Java 25 previews a simplified entry point (instance main methods / simple source files), but the classic signature above is the stable, universal form."}], "source": {"label": "JLS SE 25", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/index.html"}, "related": ["java", "How Java runs"]}, {"term": "import", "aliases": ["import statement", "package import", "java.util.Scanner"], "type": "syntax", "essence": "Tells the compiler which package a class name refers to -- required for every class except those in java.lang, which loads automatically.", "detail": [{"label": "Mechanism", "body": "Java's standard library is organized into packages (folders of related classes). java.lang (String, Math, etc.) is auto-loaded; every other package's classes must be explicitly imported by their fully-qualified path before use."}, {"label": "Form", "body": "One import per line, above and outside every class declaration -- never inside a class body or method."}, {"label": "Example", "code": "import java.util.Scanner;\n\npublic class Foo {\n    public static void main(String[] args) {\n        Scanner sc = new Scanner(System.in);\n    }\n}"}, {"label": "Common error", "body": "Placing import inside the class body gives \"illegal start of type\" -- the compiler is already past the import-reading phase and expects a class member instead. Omitting it entirely for a non-java.lang class gives \"cannot find symbol.\""}], "source": {"label": "JLS SE 25 SS7.5", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-7.html"}, "related": ["How Java runs", "Scanner"]}]}, {"id": "types", "name": "Types & Variables", "glance": "Java values are one of two kinds: primitives (raw numbers, characters, booleans, stored by value) or references (objects, addressed by reference). Primitive sizes are fixed and identical on every machine. The distinction between the two kinds is what makes == behave the way it does.", "entries": [{"term": "primitive types", "aliases": ["primitives", "byte", "short", "long", "float", "char", "value types"], "type": "concept", "provenance": "representative", "essence": "The eight built-in value types, with fixed sizes identical on every machine, stored directly (not as objects).", "detail": [{"label": "The eight primitives", "columns": ["Type", "Bits", "Category", "Notes"], "rows": [["byte", "8", "signed integer", "two's complement"], ["short", "16", "signed integer", "two's complement"], ["int", "32", "signed integer", "default integer type"], ["long", "64", "signed integer", "literal suffix L"], ["float", "32", "floating-point", "IEEE 754, suffix f"], ["double", "64", "floating-point", "IEEE 754, default decimal"], ["char", "16", "unsigned integer", "UTF-16 code unit"], ["boolean", "—", "boolean", "true / false only"]]}, {"label": "Mechanism", "body": "A primitive variable holds the value itself, not a reference to an object elsewhere. Copying a primitive copies the value."}], "source": {"label": "JLS §4.2", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-4.html"}, "related": ["int", "double", "variable declaration", "== vs .equals()"]}, {"term": "int", "aliases": ["integer", "whole number"], "type": "syntax", "provenance": "representative", "essence": "A 32-bit signed whole number — Java's default type for integer values.", "detail": [{"label": "Range", "body": "−2,147,483,648 to 2,147,483,647 (−2³¹ to 2³¹−1), stored as 4-byte two's complement."}, {"label": "Use when", "body": "Counting, indexing, and whole-number math within range. Switch to long if the value might exceed the range."}, {"label": "Example", "code": "int count = 42;\nint sum = a + b;"}], "source": {"label": "JLS §4.2", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-4.html"}, "related": ["primitive types", "double"]}, {"term": "double", "aliases": ["floating point", "decimal", "float"], "type": "syntax", "provenance": "representative", "essence": "A 64-bit IEEE 754 floating-point number — Java's default type for decimals.", "detail": [{"label": "Use when", "body": "Any calculation with fractional values where tiny rounding error is acceptable — physics, statistics, graphics."}, {"label": "Example", "code": "double g = 9.81;\ndouble avg = total / (double) n;"}], "source": {"label": "JLS §4.2", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-4.html"}, "related": ["primitive types", "int"]}, {"term": "variable declaration", "aliases": ["var", "declare", "assignment", "type inference"], "type": "syntax", "essence": "Name a typed storage slot and optionally give it a value: type name = value;", "detail": [{"label": "Form", "code": "int count = 0;\nString name = \"Roque\";"}, {"label": "Mechanism", "body": "Declares a named, typed storage slot. A primitive variable holds its value directly; a reference variable holds a pointer to an object elsewhere in memory."}], "source": {"label": "JLS §4", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-4.html"}, "related": ["primitive types", "int", "String", "var"]}, {"term": "var", "aliases": ["type inference", "local variable type inference", "var keyword"], "type": "syntax", "essence": "Tells the compiler to infer a local variable's type from its initializer, then lock it in exactly as if the type had been written out by hand -- not dynamic typing.", "detail": [{"label": "Mechanism", "body": "The compiler resolves the initializer's type at compile time and rewrites the declaration internally as if that type had been typed explicitly. var itself leaves zero trace in the compiled bytecode."}, {"label": "Legal scope", "body": "Only a local variable declaration, inside a method/constructor/block, WITH an initializer on the same line. Illegal for fields, method parameters, and return types -- none of those have an immediate initializer for the compiler to infer from at that exact point."}, {"label": "Example", "code": "var count = 10;      // inferred as int\ncount = \"ten\";       // fails -- count IS an int, same as always"}, {"label": "The Python trap", "body": "var looks flexible but is not: once inferred, the variable is exactly as statically typed as if you had written int/String/etc. by hand."}], "source": {"label": "JLS SE 25 SS14.4", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-14.html"}, "related": ["variable declaration", "primitive types"]}, {"term": "literal defaults & suffixes", "aliases": ["int default", "double default", "L suffix", "f suffix", "literal type"], "type": "concept", "essence": "A bare whole-number literal defaults to int; a bare decimal literal defaults to double -- and this default is decided before the compiler ever looks at the target variable's type.", "detail": [{"label": "Mechanism", "body": "3000000000 (no suffix) is invalid for a long variable not because long is too small, but because the literal itself is already too big to exist as the int it defaults to. The L or f suffix tells the compiler the literal's type from the very first moment, skipping the default entirely."}, {"label": "Form", "columns": ["Suffix", "Forces literal type", "Example"], "rows": [["(none, whole number)", "int", "100"], ["L", "long", "3000000000L"], ["(none, decimal)", "double", "3.14"], ["f", "float", "3.14f"]]}, {"label": "Note", "body": "double -> float is narrowing on precision, not range -- 3.14 fits in a float's range but loses precision, so it needs the f suffix or an explicit cast even though the value looks small."}], "source": {"label": "JLS SE 25 SS3.10", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-3.html"}, "related": ["primitive types", "widening & narrowing conversion"]}, {"term": "constant expression narrowing", "aliases": ["final variable narrowing", "assignment context narrowing", "byte b = 100"], "type": "concept", "essence": "A narrowing conversion is allowed WITHOUT a cast only when three conditions all hold: it's an assignment context, the source is a compile-time constant, and the value fits the target type's range.", "detail": [{"label": "The three gates (all required)", "facts": [["Gate 1", "Assignment context (a declaration or simple =) -- NEVER a method-call argument, even with an in-range literal."], ["Gate 2", "Source is a compile-time constant -- a literal, or a final variable initialized with a constant expression. A plain (non-final) variable never qualifies, regardless of how 'obviously stable' its value looks."], ["Gate 3", "The value is representable in the target type's range."]]}, {"label": "Verified behavior (JDK 21)", "columns": ["Code", "Compiles?"], "rows": [["byte b = 100;", "yes -- literal, in range"], ["int x = 100; byte b = x;", "no -- x is not final"], ["final int x = 100; byte b = x;", "yes -- final + constant + in range"], ["final int x = 200; byte b = x;", "no -- out of range, final doesn't help"], ["void f(byte b); f(100);", "no -- method call, not assignment context"]]}, {"label": "Why", "body": "The compiler never traces whether a plain variable's value actually changes before use -- that would require arbitrarily deep program analysis. final is a simple, syntactic, always-checkable substitute: it lets the compiler treat the variable exactly like a literal."}], "source": {"label": "JLS SE 25 SS5.2", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-5.html"}, "related": ["widening & narrowing conversion", "var"]}]}, {"id": "strings", "name": "Strings & Text", "glance": "A String is an immutable object — every method that seems to change it actually returns a new one. That single fact explains the literal pool, why == is the classic trap for anyone coming from Python, and why StringBuilder exists. Text blocks add readable multi-line literals, with precise, easy-to-miss whitespace rules.", "entries": [{"term": "String", "aliases": ["text", "java.lang.String", "string literal"], "type": "concept", "essence": "An immutable sequence of characters (UTF-16) — a reference type, not a primitive, with special literal and + syntax.", "detail": [{"label": "Mechanism", "body": "A String is an object holding a fixed character sequence. The language gives it two conveniences no other class gets: double-quote literals (\"hi\") and the + concatenation operator."}, {"label": "Example", "code": "String s = \"hello\";\nString greeting = s + \", world\";"}], "source": {"label": "java.lang.String (API)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/lang/String.html"}, "related": ["String immutability", "== vs .equals()", "StringBuilder", "string pool"]}, {"term": "String immutability", "aliases": ["immutable", "unchangeable", "toUpperCase returns new"], "type": "concept", "essence": "Once a String exists, its contents can never change — every 'modifying' method returns a brand-new String and leaves the original untouched.", "detail": [{"label": "Mechanism", "body": "Methods like toUpperCase(), trim(), and replace() do not edit the String in place. They compute and return a new String object; the original is unchanged."}, {"label": "Proof", "body": "Verified empirically in-lesson: calling s.toUpperCase() and then re-checking s showed s was untouched — the uppercased text only exists in the returned value."}, {"label": "Why it matters", "body": "Immutability is what makes the literal pool and thread-safety possible — a shared String can never be altered out from under another user of it."}, {"label": "Example", "code": "String s = \"hi\";\ns.toUpperCase();       // result thrown away!\nString big = s.toUpperCase();  // correct: capture it"}], "source": {"label": "java.lang.String (API)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/lang/String.html"}, "related": ["string pool", "StringBuilder", "String", "date-time immutability"]}, {"term": "string pool", "aliases": ["intern", "literal pool", "string interning", "literal cache"], "type": "concept", "essence": "Identical String literals share one single object in a cache called the pool — safe only because Strings can never change.", "detail": [{"label": "Mechanism", "body": "When the same literal text appears more than once, Java reuses one pooled object rather than making duplicates. Because Strings are immutable, sharing is safe — no user of the shared object can mutate it."}, {"label": "Consequence", "body": "Two identical literals are literally the same object, so == between them happens to return true. This is an implementation detail — never rely on it for comparison."}], "source": {"label": "JLS §3.10.5", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-3.html"}, "related": ["String immutability", "new String()", "== vs .equals()"]}, {"term": "new String()", "aliases": ["new string", "opt out of pool", "explicit string object"], "type": "syntax", "essence": "Explicitly constructs a fresh String object that deliberately does NOT come from the pool — even if an identical literal already exists.", "detail": [{"label": "Mechanism", "body": "new String(\"a\") forces a distinct object. So new String(\"a\") == \"a\" is false (different objects), even though their contents are equal."}, {"label": "Use when", "body": "Almost never in normal code. Its main value is illustrating the pool: it is the deliberate way to opt out of literal sharing."}, {"label": "Example", "code": "String a = \"a\";\nString b = new String(\"a\");\na == b;        // false — different objects\na.equals(b);   // true  — same contents"}], "source": {"label": "java.lang.String (API)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/lang/String.html"}, "related": ["string pool", "== vs .equals()", "String immutability"]}, {"term": "== vs .equals()", "aliases": ["equality", "equals", "reference equality", "content equality", "compare strings", "identity"], "type": "concept", "essence": "== asks 'are these the same object?' (reference identity); .equals() asks 'do these have the same contents?' — for Strings, always use .equals().", "detail": [{"label": "Mechanism", "body": "== compares references: are both variables pointing at the exact same object? .equals() (as String overrides it) compares the actual character sequences."}, {"label": "The Python trap", "body": "In Python, == compares values. In Java, == on any object compares identity, not value. Carrying the Python habit over is the classic source of String bugs."}, {"label": "Example", "code": "String a = new String(\"hi\");\nString b = new String(\"hi\");\na == b;        // false — two objects\na.equals(b);   // true  — same text"}], "source": {"label": "JLS §15.21", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-15.html"}, "related": ["string pool", "new String()", "String immutability"]}, {"term": "StringBuilder", "aliases": ["mutable string", "concatenation", "append", "string buffer"], "type": "concept", "essence": "A mutable character buffer — the right tool for building a String piece by piece, because it edits one buffer in place instead of creating a new object per step.", "detail": [{"label": "Mechanism", "body": "StringBuilder holds a growable internal buffer (initial capacity 16). append() and insert() modify that one buffer; you call toString() at the end to get the finished String."}, {"label": "Use when", "body": "Assembling text in a loop, or from many pieces. For a couple of + operations, plain String is fine and clearer."}, {"label": "Example", "code": "StringBuilder sb = new StringBuilder();\nfor (String w : words) sb.append(w).append(' ');\nString line = sb.toString();"}], "source": {"label": "java.lang.StringBuilder (API)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/lang/StringBuilder.html"}, "related": ["String immutability", "String"]}, {"term": "text blocks", "aliases": ["triple quote", "multiline string", "\"\"\"", "block string"], "type": "syntax", "essence": "Multi-line String literals delimited by triple quotes — readable JSON, HTML, or SQL without escaped newlines.", "detail": [{"label": "Form", "body": "Open with \"\"\" followed immediately by a newline; write the content on following lines; close with \"\"\". The result is an ordinary String."}, {"label": "Example", "code": "String json = \"\"\"\n    {\n      \"name\": \"Roque\"\n    }\n    \"\"\";"}], "source": {"label": "JLS §3.10.6", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-3.html"}, "related": ["text block whitespace", "String"]}, {"term": "text block whitespace", "aliases": ["incidental whitespace", "trailing whitespace", "\\s", "line continuation", "indentation stripping"], "type": "syntax", "essence": "Text blocks strip the whitespace you didn't mean and keep the whitespace you did — via a few precise rules worth memorizing.", "detail": [{"label": "Incidental leading whitespace", "body": "The common indentation shared by all lines (measured against the least-indented line and the closing \"\"\" position) is stripped automatically, so you can indent the block to match your code without that indentation appearing in the string."}, {"label": "Trailing whitespace", "body": "Whitespace at the end of each line is removed automatically."}, {"label": "Keep a trailing space: \\s", "body": "End a line with the \\s escape to preserve exactly one trailing space that would otherwise be stripped."}, {"label": "Join lines: trailing \\", "body": "End a line with a backslash to suppress its newline — the next line continues the same logical line."}], "source": {"label": "JLS §3.10.6", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-3.html"}, "related": ["text blocks", "String"]}]}, {"id": "operators", "name": "Operators & Conversion", "glance": "Operator precedence decides evaluation order; binary numeric promotion decides whether an arithmetic expression computes as whole numbers or decimals. Casting moves a value between differently-sized boxes -- automatic when widening, explicit and truncating (never rounding) when narrowing. The Math class wraps common numeric operations with its own, sometimes surprising, return-type rules.", "entries": [{"term": "operator precedence", "aliases": ["order of operations", "PEMDAS", "evaluation order"], "type": "concept", "essence": "Multiplication, division, and modulus evaluate before addition and subtraction, left-to-right within the same tier -- not the order the expression is read left-to-right overall.", "detail": [{"label": "Mechanism", "body": "* / % share the top arithmetic tier; + - sit below. Same-tier operators evaluate left-to-right. Precedence changes WHICH VALUE results, not whether the code compiles."}, {"label": "Example", "code": "2 + 3 * 4        // 14, not 20 -- * runs first\n10 - 4 / 2 + 3 % 2   // 9: (4/2)=2, (3%2)=1, then 10-2+1"}], "source": {"label": "JLS SE 25 SS15", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-15.html"}, "related": ["integer division & modulus", "binary numeric promotion"]}, {"term": "integer division & modulus", "aliases": ["/ operator", "% operator", "remainder", "truncating division"], "type": "concept", "essence": "int / int truncates any fractional result; % returns the remainder and takes the SAME SIGN as the dividend (left operand) -- a real trap coming from Python, where % takes the divisor's sign.", "detail": [{"label": "Mechanism", "body": "9 / 4 is pure integer arithmetic: truncates to 2, discarding the remainder entirely. 9 % 4 gives that discarded remainder: 1."}, {"label": "The Python trap", "body": "-15 % 4 is -3 in Java (sign follows the dividend, -15), but 1 in Python (sign follows the divisor)."}, {"label": "Example", "code": "9 / 4     // 2  (truncated)\n9 % 4     // 1  (remainder)\n-15 % 4   // -3 (NOT 1 -- Java differs from Python here)"}], "source": {"label": "JLS SE 25 SS15.17", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-15.html"}, "related": ["binary numeric promotion", "operator precedence"]}, {"term": "binary numeric promotion", "aliases": ["mixed-type arithmetic", "int to double promotion"], "type": "concept", "essence": "If either operand of an arithmetic operator is a floating-point type, the other operand is promoted to match, and the WHOLE operation computes in floating-point.", "detail": [{"label": "Mechanism", "body": "The / operator itself is neutral -- it isn't 'integer division' or 'decimal division' by nature. It executes whatever arithmetic the operand types dictate. 7 / 2 is pure int arithmetic (both operands int) and truncates to 3. 7.0 / 2 promotes the 2 to 2.0 first, so the whole division is floating-point: 3.5."}, {"label": "Example", "code": "7 / 2      // 3   (both int)\n7.0 / 2    // 3.5 (2 promoted to double)"}], "source": {"label": "JLS SE 25 SS5.6.2", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-5.html"}, "related": ["integer division & modulus", "widening & narrowing conversion"]}, {"term": "widening & narrowing conversion", "aliases": ["casting", "type conversion", "truncation", "(int) cast"], "type": "concept", "essence": "Widening (small box to big box) is automatic and always safe. Narrowing (big box to small box) requires an explicit cast, and for decimal-to-integer casts, truncates toward zero -- it never rounds.", "detail": [{"label": "Mechanism", "body": "double y = someInt; needs nothing extra. int x = (int) someDouble; requires the explicit (int) because information could be lost, and Java insists you say so in the code."}, {"label": "Truncation direction", "body": "Casting a decimal to an integer type chops everything after the decimal point, always toward zero -- never toward negative infinity. (int) -9.99 is -9 (closer to zero), NOT -10."}, {"label": "Example", "code": "int x = 10;\ndouble y = x;        // widening, automatic\n\ndouble d = 9.99;\nint z = (int) d;      // narrowing, explicit -- z is 9, not 10\nint w = (int) -9.99;  // w is -9, not -10"}], "source": {"label": "JLS SE 25 SS5", "url": "https://docs.oracle.com/javase/specs/jls/se25/html/jls-5.html"}, "related": ["constant expression narrowing", "literal defaults & suffixes"]}, {"term": "Math class", "aliases": ["Math.pow", "Math.abs", "Math.round", "Math.sqrt", "Math.min", "Math.max", "Math.random"], "type": "syntax", "essence": "A utility class of static numeric methods -- each has a specific, sometimes-surprising return type that does not always match intuition.", "detail": [{"label": "Return types (verified against JDK 21/25)", "columns": ["Method", "Returns", "Note"], "rows": [["Math.pow(a, b)", "double", "ALWAYS double, even for whole-number results: pow(2,10) prints 1024.0"], ["Math.abs(x)", "same as input", "Overloaded per type (abs(int)->int, abs(double)->double) -- preserves, doesn't convert"], ["Math.round(double)", "long", "floor(x + 0.5). round(-4.5) is -4, not -5 -- rounds toward positive infinity on ties"], ["Math.round(float)", "int", "Different overload, different return type than the double version"], ["Math.sqrt(x)", "double", "Always double regardless of input type"], ["Math.min / Math.max", "promoted match", "Mixed int/double args promote the int to double first, same as binary numeric promotion"], ["Math.random()", "double", "Range [0.0, 1.0) -- inclusive of 0, exclusive of 1, never exactly 1.0"]]}], "source": {"label": "java.lang.Math (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/lang/Math.html"}, "related": ["binary numeric promotion", "widening & narrowing conversion"]}]}, {"id": "io", "name": "Console I/O", "glance": "System.out offers three output methods that differ only in line-ending and templating behavior; printf's placeholders match arguments strictly by position, and a type mismatch is always a runtime failure, never a compile error. Scanner reads input by tokenizing on whitespace -- the source of its single most common bug, where a leftover newline from one read silently empties the very next nextLine() call.", "entries": [{"term": "System.out.print / println / printf", "aliases": ["print", "println", "printf", "System.out"], "type": "syntax", "essence": "print outputs exactly what you give it; println does the same and appends one line terminator; printf builds output from a format-string template with placeholders.", "detail": [{"label": "Mechanism", "body": "System.out is a PrintStream instance. print/println differ only in the trailing line terminator. printf takes a format string plus a list of values and substitutes them into %-placeholders."}, {"label": "Example", "code": "System.out.print(\"Hi\");    // no newline after\nSystem.out.println(\"Hi\");  // newline after\nSystem.out.printf(\"Age: %d%n\", 25);  // \"Age: 25\""}], "source": {"label": "java.io.PrintStream (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/io/PrintStream.html"}, "related": ["printf format specifiers", "Scanner"]}, {"term": "printf format specifiers", "aliases": ["%d", "%s", "%f", "%.2f", "%n", "format string"], "type": "syntax", "essence": "Placeholders are matched to arguments strictly by position, left to right -- and a type mismatch between a placeholder and its argument compiles fine but throws at runtime.", "detail": [{"label": "Common specifiers", "columns": ["Specifier", "Expects", "Note"], "rows": [["%d", "integer types", "Strict -- a non-integer argument throws IllegalFormatConversionException"], ["%s", "anything", "Flexible -- calls .toString() on any argument, never fails on type"], ["%f", "floating-point", "Defaults to exactly 6 decimal places unless given precision"], ["%.2f", "floating-point", "Exactly 2 decimal places"], ["%n", "(none)", "Platform-correct line separator -- preferred over a literal \\n"]]}, {"label": "Positional matching", "body": "The 1st placeholder pairs with the 1st argument after the format string, the 2nd with the 2nd, and so on -- pure left-to-right order, nothing name-based."}, {"label": "Type-check timing", "body": "printf accepts a generic Object... argument list, so the compiler cannot check placeholder/argument type agreement. A mismatch (e.g. %d given a String) compiles cleanly and throws IllegalFormatConversionException only when the line actually executes."}], "source": {"label": "java.util.Formatter (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/util/Formatter.html"}, "related": ["System.out.print / println / printf"]}, {"term": "Scanner", "aliases": ["java.util.Scanner", "reading input", "console input"], "type": "syntax", "essence": "Reads input by breaking it into tokens using a delimiter pattern that defaults to whitespace -- requires import java.util.Scanner, unlike java.lang classes.", "detail": [{"label": "Mechanism", "body": "next*/nextInt/nextDouble/next() read a token only up to the next delimiter (whitespace, including the newline from Enter) and leave that delimiter unconsumed in the buffer."}, {"label": "Example", "code": "import java.util.Scanner;\nScanner sc = new Scanner(System.in);\nint age = sc.nextInt();\ndouble price = sc.nextDouble();"}], "source": {"label": "java.util.Scanner (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/util/Scanner.html"}, "related": ["Scanner nextLine buffer issue", "import"]}, {"term": "Scanner nextLine buffer issue", "aliases": ["nextInt nextLine bug", "leftover newline", "empty string scanner"], "type": "concept", "essence": "Any next* method (nextInt, nextDouble, next) leaves the trailing newline unconsumed; if nextLine() is called right after, it immediately grabs that leftover newline and returns an empty string, skipping the real input entirely.", "detail": [{"label": "Mechanism", "body": "nextInt() reads only digit characters and stops at the newline -- it never consumes it. The very next thing in the input queue is that leftover newline, so a following nextLine() call finds it immediately and returns \"\" without ever reaching the real text typed afterward."}, {"label": "Fix", "body": "Insert exactly one throwaway sc.nextLine(); (its return value discarded) right after the next*/nextInt/nextDouble call, before the real nextLine() call that should capture input. Adding a SECOND unnecessary throwaway call consumes actual input instead and can crash with NoSuchElementException once the input runs out."}, {"label": "Example", "code": "int age = sc.nextInt();\nsc.nextLine();              // discard the leftover newline\nString name = sc.nextLine(); // now captures the real input"}, {"label": "General rule", "body": "nextLine() called on its own, back-to-back, has no leftover problem -- it is only ever caused by a DIFFERENT next* method running immediately before it."}], "source": {"label": "java.util.Scanner (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/util/Scanner.html"}, "related": ["Scanner"]}]}, {"id": "datetime", "name": "Dates & Times", "glance": "The java.time types differ by exactly what they carry — a date, a time, both, both plus a zone, or a machine-timeline instant — and the right one is the smallest that holds what the problem needs. Every value is immutable, so arithmetic returns a new object and must be assigned. Amounts split the same way: Duration measures exact elapsed time and Period measures calendar time, and across a daylight-saving change they deliberately give different answers.", "entries": [{"term": "java.time types", "aliases": ["LocalDate", "LocalTime", "LocalDateTime", "ZonedDateTime", "Instant", "which date class", "date type"], "type": "concept", "essence": "Five types that differ only in what they carry; choosing correctly means picking the smallest one that holds what the problem actually needs, because every extra thing carried is another thing that can go wrong.", "detail": [{"label": "The five types", "columns": ["Type", "Carries", "Does NOT carry", "Example value"], "rows": [["LocalDate", "a calendar date", "any time or zone", "2026-01-31"], ["LocalTime", "a time of day", "any date or zone", "09:05:30"], ["LocalDateTime", "a date and a time", "a zone — so it is not a real moment", "2026-01-31T09:05"], ["ZonedDateTime", "a date, a time, and a zone's rules", "nothing — a real moment, subject to DST", "2026-03-08T01:30-05:00[America/New_York]"], ["Instant", "a point on the machine timeline (UTC)", "human calendar context", "2026-07-17T14:30:00Z"]]}, {"label": "Mechanism", "body": "The prefix Local means no zone is attached. A LocalDateTime of 09:05 is a reading any clock anywhere could show; it is not a moment in the world until a zone is attached. Attaching one produces a ZonedDateTime, and that is the precise point at which daylight-saving rules start applying to arithmetic."}, {"label": "Use when", "body": "A birthday is a LocalDate -- it does not shift when you fly. A meeting across cities is a ZonedDateTime. A log timestamp is an Instant. Reaching for a bigger type than the problem needs is what imports zone bugs into code that never needed a zone."}, {"label": "Note", "body": "All five live in java.time and all are immutable."}], "source": {"label": "java.time (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/time/package-summary.html"}, "related": ["creating date-time values", "date-time immutability", "ZonedDateTime & DST"]}, {"term": "creating date-time values", "aliases": ["LocalDate.of", "now", "parse", "factory method", "new LocalDate", "DateTimeException"], "type": "syntax", "essence": "Built through static factory methods -- of(), now(), and parse() -- never with new, because these classes have no public constructors.", "detail": [{"label": "Mechanism", "body": "The java.time classes hide their constructors, so new LocalDate() does not compile. Factories are the only door in. Months are 1-based here: 1 is January, unlike the 0-based month of the legacy java.util.Calendar API."}, {"label": "The three ways", "facts": [["of(...)", "build from explicit parts -- LocalDate.of(2026, 1, 31)"], ["now()", "read the current value from the system clock -- LocalDate.now()"], ["parse(text)", "build from ISO text -- LocalDate.parse(\"2026-01-31\")"]]}, {"label": "Verified behavior (JDK 21)", "body": "An impossible date throws instead of rolling over: LocalDate.of(2026, 2, 30) raises DateTimeException. It does not silently become March 2 the way a lenient date API would."}, {"label": "Example", "code": "LocalDate d  = LocalDate.of(2026, 1, 31);   // 2026-01-31\nLocalDate t  = LocalDate.now();\nLocalDate p  = LocalDate.parse(\"2026-01-31\");\n// LocalDate x = new LocalDate();          // does not compile"}], "source": {"label": "java.time (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/time/package-summary.html"}, "related": ["java.time types", "date-time immutability"]}, {"term": "date-time immutability", "aliases": ["plusDays", "minusDays", "withYear", "unassigned result", "immutable date", "returns new object"], "type": "concept", "essence": "Every plus/minus/with call returns a NEW value and leaves the original untouched, so a call whose result is not assigned does nothing at all.", "detail": [{"label": "Mechanism", "body": "A date-time object can never change after it is created. plusDays(1) computes a new object and hands it back; the variable it was called on still holds the old value. This is the identical rule String follows, and for the identical reason -- a value that can be shared safely can only ever hand back a new one."}, {"label": "Verified behavior (JDK 21)", "body": "Month-end arithmetic clamps rather than overflowing: 2026-01-31 plusMonths(1) gives 2026-02-28, the last valid day of the target month, with no exception raised."}, {"label": "Example", "code": "LocalDate d = LocalDate.of(2026, 1, 31);\nd.plusDays(1);         // returns 2026-02-01 -- thrown away\nSystem.out.println(d); // 2026-01-31 -- unchanged\n\nd = d.plusDays(1);     // the working form"}], "source": {"label": "java.time (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/time/package-summary.html"}, "related": ["String immutability", "java.time types", "creating date-time values"]}, {"term": "Period vs Duration", "aliases": ["Duration", "Period", "elapsed time", "calendar time", "which amount type", "ofDays", "ofHours", "PT2H", "P1Y2M3D"], "type": "concept", "essence": "Duration measures exact elapsed time and is blind to calendars; Period measures calendar time and is blind to exact seconds -- and the choice only reveals itself where the two disagree.", "detail": [{"label": "The two amounts", "columns": ["Type", "Measures in", "Blind to", "toString form"], "rows": [["Duration", "hours, minutes, seconds, nanos", "calendars -- a day is always exactly 24h to it", "PT2H · PT1H30M"], ["Period", "years, months, days", "exact seconds -- a day is whatever the calendar says", "P1Y2M3D · P1M1D"]]}, {"label": "Mechanism", "body": "A daylight-saving change is the place the two part company. On a spring-forward date the calendar day is only 23 real hours long. Adding one calendar day and adding 24 exact hours therefore land on different clock times. Neither is wrong -- they answer different questions, and the directional consequence follows from which frame is held fixed: Period holds the clock reading fixed and lets elapsed time vary; Duration holds elapsed time fixed and lets the clock reading vary."}, {"label": "Verified behavior (JDK 21)", "code": "ZoneId ny = ZoneId.of(\"America/New_York\");\nZonedDateTime start = ZonedDateTime.of(\n    LocalDateTime.of(2026, 3, 7, 12, 0), ny);   // 12:00 -05:00, day before spring-forward\n\nstart.plusDays(1);                 // 2026-03-08T12:00-04:00  <- same clock time\nstart.plus(Duration.ofHours(24));  // 2026-03-08T13:00-04:00  <- an hour later on the clock\n\n// real hours between start and plusDays(1): 23"}, {"label": "Use when", "body": "Ask which frame the answer must honour. \"Same time tomorrow\" is a calendar promise -- Period or plusDays. \"24 hours from now\" is a stopwatch promise -- Duration. Choosing by unit size alone (days feel big, hours feel small) is what selects the wrong one."}, {"label": "Note", "body": "The ofX factories are static, so chaining them does not accumulate: Period.ofYears(1).ofMonths(2) evaluates to P2M -- only the last call survives. Build multi-field amounts with Period.of(1, 2, 0)."}], "source": {"label": "java.time (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/time/package-summary.html"}, "related": ["Period.between()", "ZonedDateTime & DST", "java.time types"]}, {"term": "Period.between()", "aliases": ["between", "date difference", "months and days", "age calculation", "ChronoUnit.DAYS.between"], "type": "concept", "essence": "Reports the gap between two dates by removing complete calendar months first, then counting the days left over from wherever that landed -- not by dividing a total day count.", "detail": [{"label": "Mechanism", "body": "It advances from the start date by whole calendar months for as long as it can without passing the end date, then counts the remaining days from that landing point. Because months differ in length, the day part depends entirely on where the month-stepping stopped -- which is why the result cannot be reproduced by dividing a total number of days."}, {"label": "Verified behavior (JDK 21)", "code": "Period p = Period.between(\n    LocalDate.of(2024, 1, 31),\n    LocalDate.of(2024, 3, 1));\n// P1M1D -- one month, one day\n\n// why: Jan 31 + 1 month clamps to Feb 29 (2024 is a leap year),\n// and Feb 29 -> Mar 1 is one further day."}, {"label": "Use when", "body": "Reporting an age or a gap in human calendar terms. For a plain exact count instead, use ChronoUnit.DAYS.between(), which returns a single total and never splits into months."}, {"label": "Note", "body": "Argument order matters: a start date later than the end date yields a negative Period."}], "source": {"label": "java.time (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/time/package-summary.html"}, "related": ["Period vs Duration", "date-time immutability"]}, {"term": "ZonedDateTime & DST", "aliases": ["ZoneId", "daylight saving", "spring forward", "fall back", "UTC offset", "America/New_York", "23 hour day"], "type": "concept", "essence": "A ZoneId carries a region's daylight-saving rulebook, so zoned arithmetic adjusts the UTC offset automatically and some calendar days are not 24 hours long.", "detail": [{"label": "Mechanism", "body": "A zone is a rulebook, not a fixed offset. America/New_York means -05:00 in winter and -04:00 in summer, and the rulebook states when it flips. On the spring-forward date the 2:00 hour does not exist at all, making that calendar day 23 real hours; on the fall-back date one hour occurs twice, making it 25."}, {"label": "Spring-forward, 2026-03-07 12:00 New York (verified JDK 21)", "chain": [{"name": "12:00 -05:00", "role": "start"}, {"name": "plusDays(1)", "role": "calendar +1 day"}, {"name": "12:00 -04:00", "role": "23 real hours later"}]}, {"label": "Use when", "body": "Any time a real moment must survive a zone or a DST boundary. A LocalDateTime has no rulebook attached and therefore cannot be affected by any of this -- which is a positive reason to prefer it when zones genuinely do not matter."}, {"label": "Note", "body": "Constructing a time inside the skipped hour does not throw; it is shifted forward to a real time instead."}], "source": {"label": "java.time (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/time/package-summary.html"}, "related": ["zone conversion & the date shift", "Period vs Duration", "java.time types"]}, {"term": "zone conversion & the date shift", "aliases": ["withZoneSameInstant", "withZoneSameLocal", "same instant", "date changes", "across midnight", "timezone conversion"], "type": "concept", "essence": "Viewing one moment from another zone can move the wall clock across midnight, changing the reported calendar date -- the real danger of routing a calendar-only concept through a ZonedDateTime.", "detail": [{"label": "Mechanism", "body": "withZoneSameInstant keeps the moment identical and re-reads it on a different region's clock. If that clock has already passed midnight, the same instant reports a different calendar date. Nothing moved in time; only the viewpoint changed."}, {"label": "Verified behavior (JDK 21)", "code": "ZonedDateTime ny = ZonedDateTime.of(\n    LocalDateTime.of(2000, 3, 15, 20, 0),\n    ZoneId.of(\"America/New_York\"));    // 2000-03-15T20:00-05:00\n\nny.withZoneSameInstant(ZoneId.of(\"Asia/Tokyo\"));\n// 2000-03-16T10:00+09:00 -- same instant, NEXT DAY's date"}, {"label": "Use when", "body": "Pulling toLocalDate() off a converted ZonedDateTime can hand back a date the user would not recognise as theirs. If the concept is fundamentally a date -- a birthday, a due date -- keep it a LocalDate and never route it through a zone at all."}, {"label": "Note", "body": "Contrast withZoneSameLocal, which keeps the clock reading and changes the moment instead -- the opposite trade."}], "source": {"label": "java.time (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/time/package-summary.html"}, "related": ["ZonedDateTime & DST", "java.time types"]}, {"term": "DateTimeFormatter patterns", "aliases": ["ofPattern", "format", "parse", "MM vs mm", "HH vs hh", "MMMM", "ISO_LOCAL_DATE", "pattern letters"], "type": "syntax", "essence": "Formats a date-time into text or parses text back, driven by pattern letters where CASE selects the field and the letter COUNT selects the width or verbosity.", "detail": [{"label": "Mechanism", "body": "Upper and lower case are different fields entirely, not styles of one field: MM is month and mm is minute. The number of letters then chooses how that field is rendered. This is why a wrong-case pattern still compiles, still runs, and simply prints the wrong value -- there is no error to catch it."}, {"label": "Case decides the field (verified JDK 21, on 2026-01-31T13:05)", "columns": ["Pattern", "Means", "Output"], "rows": [["MM", "month", "01"], ["mm", "minute", "05"], ["HH", "hour, 24-hour clock", "13"], ["hh", "hour, 12-hour clock", "01"], ["a", "AM/PM marker", "PM"], ["dd", "day of month", "31"], ["yyyy", "year", "2026"]]}, {"label": "Letter count decides verbosity", "columns": ["Pattern", "Output"], "rows": [["M", "1"], ["MM", "01"], ["MMM", "Jan"], ["MMMM", "January"]]}, {"label": "Example", "code": "DateTimeFormatter f = DateTimeFormatter.ofPattern(\"MM/dd/yyyy\");\nf.format(LocalDate.of(2026, 1, 31));        // 01/31/2026\nLocalDate.parse(\"01/31/2026\", f);           // 2026-01-31\n\nDateTimeFormatter.ISO_LOCAL_DATE.format(d); // 2026-01-31"}, {"label": "Use when", "body": "Reach for a predefined constant such as ISO_LOCAL_DATE when standard ISO text is what is wanted; write ofPattern only for a layout the constants do not already cover."}], "source": {"label": "DateTimeFormatter (API, SE 25)", "url": "https://docs.oracle.com/en/java/javase/25/docs/api/java.base/java/time/format/DateTimeFormatter.html"}, "related": ["java.time types", "creating date-time values"]}]}]}</script>
<style>
:root{
  --bg:#F4F6F8; --surface:#FFFFFF; --surface-2:#EBEEF2; --border:#DFE3E9;
  --ink:#171A21; --ink-2:#565E6B; --ink-3:#8B93A0;
  --accent:#0F7B8A; --accent-ink:#0B5E6A; --accent-soft:#D7EBEE; --accent-line:#8FCBD3;
  --mark:#FCE8A6;
  --shadow:0 1px 2px rgba(20,30,45,.06), 0 6px 20px rgba(20,30,45,.05);
  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,"Cascadia Code","Roboto Mono",monospace;
  --maxw:760px;
}
html[data-theme="dark"]{
  --bg:#0F1216; --surface:#171B21; --surface-2:#1E232B; --border:#2A303A;
  --ink:#E7EAEF; --ink-2:#A4ACB8; --ink-3:#727B88;
  --accent:#33AEBD; --accent-ink:#7FD3DD; --accent-soft:#16323A; --accent-line:#26525C;
  --mark:#5A4C1E;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{
  background:var(--bg); color:var(--ink);
  font-family:var(--font-sans);
  font-size:16px; line-height:1.55;
  -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  padding-bottom:env(safe-area-inset-bottom);
}
a{color:var(--accent-ink); text-decoration:none}
mark{background:var(--mark); color:inherit; border-radius:2px; padding:0 .5px}

/* ---------- top bar ---------- */
.top{
  position:sticky; top:0; z-index:40;
  background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:saturate(1.4) blur(10px);
  -webkit-backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--border);
  padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;
}
.top-inner{max-width:var(--maxw); margin:0 auto; display:flex; flex-direction:column; gap:10px}
.brand{display:flex; align-items:center; justify-content:space-between; gap:12px}
.wordmark{display:flex; flex-direction:column; line-height:1.15; min-width:0}
.wordmark .n{font-family:var(--font-mono); font-weight:600; font-size:16px; letter-spacing:-.2px}
.wordmark .n b{color:var(--accent-ink); font-weight:700}
.wordmark .s{font-size:11px; color:var(--ink-3); letter-spacing:.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.iconbtn{
  appearance:none; border:1px solid var(--border); background:var(--surface); color:var(--ink-2);
  width:38px; height:38px; border-radius:10px; display:grid; place-items:center; cursor:pointer;
  flex:0 0 auto; transition:border-color .15s, color .15s;
}
.iconbtn:hover{color:var(--ink); border-color:var(--accent-line)}
.iconbtn svg{width:18px; height:18px; display:block}
.tools{display:flex; gap:8px}

/* ---------- search ---------- */
.searchwrap{position:relative}
.searchbar{
  display:flex; align-items:center; gap:9px;
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  padding:0 12px; height:46px; box-shadow:var(--shadow);
  transition:border-color .15s, box-shadow .15s;
}
.searchbar:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.searchbar svg{width:18px; height:18px; color:var(--ink-3); flex:0 0 auto}
.searchbar input{
  border:0; outline:0; background:transparent; color:var(--ink);
  font-family:var(--font-sans); font-size:16px; width:100%; height:100%;
}
.searchbar input::placeholder{color:var(--ink-3)}
.searchbar .kbd{
  font-family:var(--font-mono); font-size:11px; color:var(--ink-3);
  border:1px solid var(--border); border-radius:6px; padding:2px 6px; flex:0 0 auto;
}
.clearbtn{appearance:none;border:0;background:transparent;color:var(--ink-3);cursor:pointer;padding:4px;display:none}
.clearbtn svg{width:16px;height:16px}
.searchbar.has-q .clearbtn{display:block}
.searchbar.has-q .kbd{display:none}

/* results overlay */
.results{
  position:absolute; left:0; right:0; top:calc(100% + 8px); z-index:50;
  background:var(--surface); border:1px solid var(--border); border-radius:14px;
  box-shadow:var(--shadow); overflow:hidden; display:none; max-height:70vh; overflow-y:auto;
}
.results.open{display:block}
.result{
  display:block; width:100%; text-align:left; appearance:none; border:0; background:transparent;
  padding:11px 14px; cursor:pointer; border-bottom:1px solid var(--border);
}
.result:last-child{border-bottom:0}
.result:hover,.result.active{background:var(--surface-2)}
.result .r-top{display:flex; align-items:center; gap:8px}
.result .r-term{font-family:var(--font-mono); font-size:14px; font-weight:600; color:var(--ink)}
.result .r-ess{font-size:12.5px; color:var(--ink-2); margin-top:3px; line-height:1.45;
  display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden}
.result .r-hint{padding:11px 14px; font-size:12.5px; color:var(--ink-3)}

/* ---------- filters ---------- */
.filters{display:flex; gap:7px; overflow-x:auto; padding:2px 2px 1px; margin:-2px; scrollbar-width:none}
.filters::-webkit-scrollbar{display:none}
.chip{
  appearance:none; white-space:nowrap; cursor:pointer; flex:0 0 auto;
  border:1px solid var(--border); background:var(--surface); color:var(--ink-2);
  font-family:var(--font-mono); font-size:12px; font-weight:500; letter-spacing:.2px;
  padding:6px 11px; border-radius:999px; transition:.15s; display:flex; align-items:center; gap:6px;
}
.chip:hover{color:var(--ink); border-color:var(--accent-line)}
.chip[aria-pressed="true"]{background:var(--accent); border-color:var(--accent); color:#fff}
.chip .dot{width:7px;height:7px;border-radius:50%}
.chip .dot.concept{background:var(--accent)} .chip .dot.syntax{background:var(--ink-3)}
html[data-theme] .chip[aria-pressed="true"] .dot{background:rgba(255,255,255,.9)}

/* ---------- index sheet ---------- */
.index{
  max-width:var(--maxw); margin:0 auto; overflow:hidden;
  max-height:0; transition:max-height .28s ease;
}
.index.open{max-height:400px}
.index-inner{padding:12px 16px 4px}
.index a{
  display:flex; align-items:baseline; justify-content:space-between; gap:10px;
  padding:9px 12px; border:1px solid var(--border); border-radius:10px; background:var(--surface);
  margin-bottom:8px; color:var(--ink);
}
.index a .ix-n{font-weight:600; font-size:14px}
.index a .ix-c{font-family:var(--font-mono); font-size:11px; color:var(--ink-3)}

/* ---------- main ---------- */
main{max-width:var(--maxw); margin:0 auto; padding:18px 16px 80px}
.area{margin-bottom:34px; scroll-margin-top:184px}
.area-head{display:flex; align-items:baseline; gap:10px; margin:0 2px 12px}
.eyebrow{font-family:var(--font-mono); font-size:10.5px; font-weight:600; letter-spacing:1.4px;
  text-transform:uppercase; color:var(--accent-ink)}
.area-title{font-size:20px; font-weight:680; letter-spacing:-.3px; margin:0}
.area-count{font-family:var(--font-mono); font-size:11px; color:var(--ink-3); margin-left:auto}
.glance{
  background:var(--accent-soft); border:1px solid var(--accent-line);
  border-radius:12px; padding:13px 15px; margin-bottom:16px;
}
.glance .eyebrow{color:var(--accent-ink); display:block; margin-bottom:5px}
.glance p{margin:0; font-size:14px; line-height:1.6; color:var(--ink)}
html[data-theme="dark"] .glance p{color:var(--ink)}

/* ---------- entry card ---------- */
.card{
  background:var(--surface); border:1px solid var(--border); border-radius:12px;
  margin-bottom:11px; overflow:hidden; box-shadow:var(--shadow);
  scroll-margin-top:184px; transition:border-color .18s;
}
.card.flash{border-color:var(--accent); animation:flash 1.4s ease}
@keyframes flash{0%{box-shadow:0 0 0 3px var(--accent-soft)}100%{box-shadow:var(--shadow)}}
.card-head{
  appearance:none; width:100%; text-align:left; border:0; background:transparent; cursor:pointer;
  padding:13px 15px; display:block; color:inherit;
}
.card-row{display:flex; align-items:center; gap:8px}
.badge{
  font-family:var(--font-mono); font-size:9.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase;
  padding:2.5px 6px; border-radius:5px; flex:0 0 auto; line-height:1;
}
.badge.concept{background:var(--accent-soft); color:var(--accent-ink)}
.badge.syntax{background:var(--surface-2); color:var(--ink-2)}
.term{font-family:var(--font-mono); font-size:15px; font-weight:600; color:var(--ink); letter-spacing:-.2px; min-width:0; word-break:break-word}
.chev{margin-left:auto; color:var(--ink-3); flex:0 0 auto; transition:transform .2s}
.chev svg{width:18px;height:18px;display:block}
.card[open] .chev{transform:rotate(90deg)}
.essence{margin:7px 0 0; font-size:14.5px; line-height:1.5; color:var(--ink-2)}
.card[open] .essence{color:var(--ink)}

/* detail */
.detail{display:none; padding:2px 15px 15px 17px; border-left:2px solid var(--accent-line); margin:0 0 0 13px}
.card[open] .detail{display:block}
.field{margin-top:13px}
.field .flabel{font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.8px; text-transform:uppercase; color:var(--ink-3); margin-bottom:4px}
.field .fbody{font-size:14px; line-height:1.6; color:var(--ink)}
.field .fbody code{font-family:var(--font-mono); font-size:12.5px; background:var(--surface-2); padding:1px 5px; border-radius:5px}

pre{margin:6px 0 0; background:var(--surface-2); border:1px solid var(--border); border-radius:9px;
  padding:11px 12px; overflow-x:auto; position:relative}
pre code{font-family:var(--font-mono); font-size:12.5px; line-height:1.55; color:var(--ink); white-space:pre}
.copybtn{
  position:absolute; top:7px; right:7px; appearance:none; cursor:pointer;
  border:1px solid var(--border); background:var(--surface); color:var(--ink-3);
  font-family:var(--font-mono); font-size:10px; letter-spacing:.4px; padding:3px 7px; border-radius:6px;
  opacity:.65; transition:.15s;
}
.copybtn:hover{opacity:1; color:var(--ink)}


/* tables — list/collection content */
.tablewrap{margin-top:6px; overflow-x:auto; border:1px solid var(--border); border-radius:9px; -webkit-overflow-scrolling:touch}
table.ref{border-collapse:collapse; width:100%; font-size:12.5px}
table.ref th,table.ref td{text-align:left; padding:7px 11px; border-bottom:1px solid var(--border); white-space:nowrap}
table.ref thead th{font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-3); background:var(--surface-2)}
table.ref tbody tr:last-child td{border-bottom:0}
table.ref td{color:var(--ink-2)}
table.ref td:first-child{font-family:var(--font-mono); font-weight:600; color:var(--ink)}

/* mobile: reflow tables into stacked cards (no horizontal scroll) */
@media (max-width:560px){
  .tablewrap{border:0; overflow:visible}
  table.ref{font-size:13px}
  table.ref thead{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0)}
  table.ref, table.ref tbody, table.ref tr, table.ref td{display:block; width:100%}
  table.ref tr{border:1px solid var(--border); border-radius:9px; background:var(--surface); padding:9px 11px; margin-bottom:8px}
  table.ref td{border:0; padding:0}
  table.ref td:first-child{padding-bottom:6px; margin-bottom:6px; border-bottom:1px solid var(--border); font-size:14px; white-space:normal}
  table.ref td:not(:first-child){display:grid; grid-template-columns:5.5em 1fr; gap:10px; padding:2px 0}
  table.ref td:not(:first-child)::before{content:attr(data-label); font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; color:var(--ink-3); align-self:center}
}

/* fact rows — mono keyword leads a prose description */
.facts{display:grid; grid-template-columns:minmax(0,max-content) 1fr; column-gap:14px; row-gap:6px; margin-top:6px}
.facts dt{font-family:var(--font-mono); font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; line-height:1.5}
.facts dd{font-size:14px; line-height:1.45; color:var(--ink-2)}
@media (max-width:480px){ .facts{grid-template-columns:1fr; row-gap:2px} .facts dt{margin-top:6px} .facts dt:first-of-type{margin-top:0} }

/* chain / flow diagram — labeled nodes joined by arrows */
.chain{display:flex; flex-wrap:wrap; align-items:stretch; gap:6px; margin-top:6px}
.chain .node{display:flex; flex-direction:column; gap:2px; justify-content:center; padding:7px 11px; background:var(--surface-2); border:1px solid var(--border); border-radius:8px; min-width:0}
.chain .node-name{font-family:var(--font-mono); font-size:13px; font-weight:600; color:var(--ink)}
.chain .node-role{font-family:var(--font-mono); font-size:9px; font-weight:600; letter-spacing:.5px; text-transform:uppercase; color:var(--accent-ink)}
.chain .arrow{align-self:center; color:var(--accent); font-weight:700; font-size:15px}

/* topic nav — persistent wayfinding with scroll tracking */
.topicnav{display:flex; gap:4px; overflow-x:auto; scrollbar-width:none; margin:0 -2px; padding:1px 2px}
.topicnav::-webkit-scrollbar{display:none}
.topicnav a{flex:0 0 auto; white-space:nowrap; font-family:var(--font-mono); font-size:12px; font-weight:500; color:var(--ink-3);
  padding:5px 9px; border-radius:7px; border-bottom:2px solid transparent; text-decoration:none; transition:color .15s}
.topicnav a:hover{color:var(--ink-2)}
.topicnav a.active{color:var(--accent-ink); border-bottom-color:var(--accent)}

/* source + related */
.foot{display:flex; flex-wrap:wrap; gap:8px 14px; align-items:center; margin-top:14px; padding-top:12px; border-top:1px solid var(--border)}
.source{display:inline-flex; align-items:center; gap:5px; font-size:12px; color:var(--ink-2)}
.source .sl{font-family:var(--font-mono); font-size:10px; letter-spacing:.4px; color:var(--ink-3); text-transform:uppercase}
.source a{display:inline-flex; align-items:center; gap:4px; color:var(--accent-ink); font-size:12.5px; font-weight:500}
.source a svg{width:11px;height:11px}
.related{display:flex; flex-wrap:wrap; gap:6px; align-items:center}
.related .rl{font-family:var(--font-mono); font-size:10px; letter-spacing:.4px; color:var(--ink-3); text-transform:uppercase; margin-right:2px}
.rel{appearance:none; cursor:pointer; border:1px solid var(--border); background:var(--surface-2);
  color:var(--ink-2); font-family:var(--font-mono); font-size:11px; padding:3px 8px; border-radius:999px; transition:.15s}
.rel:hover{color:var(--accent-ink); border-color:var(--accent-line)}
.prov{margin-top:10px; font-size:11.5px; color:var(--ink-3); font-style:italic}

.empty{text-align:center; color:var(--ink-3); padding:50px 20px; font-size:14px}
.empty .term{color:var(--accent-ink)}

.legend{display:flex; flex-wrap:wrap; gap:4px 12px; margin:2px 2px 0; font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3)}
.legend span{display:inline-flex; align-items:center; gap:5px}
.legend i{width:8px;height:8px;border-radius:2px;display:inline-block}
.ttop{position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:30;
  width:44px; height:44px; border-radius:50%; border:1px solid var(--border); background:var(--surface);
  color:var(--ink-2); display:none; place-items:center; cursor:pointer; box-shadow:var(--shadow)}
.ttop.show{display:grid}
.ttop svg{width:20px;height:20px}

@media (prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important}}
</style>
</head>
<body>

<header class="top">
  <div class="top-inner">
    <div class="brand">
      <div class="wordmark">
        <span class="n" id="wm"></span>
        <span class="s" id="ws"></span>
      </div>
      <div class="tools">
        <button class="iconbtn" id="themeBtn" aria-label="Toggle dark mode">
          <svg id="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
          <svg id="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>
    </div>

    <div class="searchwrap">
      <div class="searchbar" id="sbar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" inputmode="search" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Search concepts, syntax, examples…" aria-label="Search the reference">
        <span class="kbd">/</span>
        <button class="clearbtn" id="clearBtn" aria-label="Clear search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="results" id="results" role="listbox"></div>
    </div>

    <div class="filters" id="filters">
      <button class="chip" data-f="all" aria-pressed="true">All</button>
      <button class="chip" data-f="concept" aria-pressed="false"><span class="dot concept"></span>Concept</button>
      <button class="chip" data-f="syntax" aria-pressed="false"><span class="dot syntax"></span>Syntax</button>
    </div>
    <nav class="topicnav" id="topicnav" aria-label="Topic areas"></nav>
  </div>
</header>

<main id="main"></main>

<button class="ttop" id="toTop" aria-label="Back to top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg></button>

<script>
"use strict";
const DATA = JSON.parse(document.getElementById('refdata').textContent);
const $ = (s,r=document)=>r.querySelector(s);
const esc = s => s.replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));

/* ---- header text ---- */
$('#wm').innerHTML = 'Java<b>Ref</b>';
$('#ws').textContent = DATA.meta.subtitle || '';

/* ---- flatten entries with area info ---- */
const ALL = [];
DATA.topicAreas.forEach(area=>{
  area.entries.forEach(e=>{ ALL.push({...e, areaId:area.id, areaName:area.name}); });
});
const slug = t => t.toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');

/* ---- build markup ---- */
function iconExt(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M15 3h6v6M10 14 21 3M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/></svg>';}
function iconChev(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';}

function fieldHTML(f){
  if(f.columns){
    const head='<thead><tr>'+f.columns.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr></thead>';
    const body='<tbody>'+(f.rows||[]).map(r=>'<tr>'+r.map((c,i)=>'<td'+(i?' data-label="'+esc(f.columns[i])+'"':'')+'>'+esc(c)+'</td>').join('')+'</tr>').join('')+'</tbody>';
    return '<div class="field"><div class="flabel">'+esc(f.label)+'</div><div class="tablewrap"><table class="ref">'+head+body+'</table></div></div>';
  }
  if(f.facts){
    const rows=f.facts.map(p=>'<dt>'+esc(p[0])+'</dt><dd>'+esc(p[1])+'</dd>').join('');
    return '<div class="field"><div class="flabel">'+esc(f.label)+'</div><dl class="facts">'+rows+'</dl></div>';
  }
  if(f.chain){
    const nodes=f.chain.map(n=>{
      const name = typeof n==='string' ? n : n.name;
      const role = typeof n==='string' ? '' : (n.role||'');
      return '<span class="node"><span class="node-name">'+esc(name)+'</span>'+(role?'<span class="node-role">'+esc(role)+'</span>':'')+'</span>';
    }).join('<span class="arrow" aria-hidden="true">→</span>');
    return '<div class="field"><div class="flabel">'+esc(f.label)+'</div><div class="chain">'+nodes+'</div></div>';
  }
  if(f.code!==undefined){
    return '<div class="field"><div class="flabel">'+esc(f.label)+'</div>'+
      '<pre><button class="copybtn" type="button">copy</button><code>'+esc(f.code)+'</code></pre></div>';
  }
  return '<div class="field"><div class="flabel">'+esc(f.label)+'</div><div class="fbody">'+esc(f.body)+'</div></div>';
}
function entryHTML(e){
  const id = slug(e.term);
  const details = (e.detail||[]).map(fieldHTML).join('');
  const prov = e.provenance==='representative' ? '<div class="prov">Representative — confirm against your actual lesson.</div>' : '';
  let source = '';
  if(e.source){ source = '<span class="source"><span class="sl">Source</span> <a href="'+esc(e.source.url)+'" target="_blank" rel="noopener">'+esc(e.source.label)+' '+iconExt()+'</a></span>'; }
  let related = '';
  if(e.related && e.related.length){
    related = '<span class="related"><span class="rl">See also</span>'+
      e.related.map(r=>'<button class="rel" type="button" data-jump="'+esc(slug(r))+'">'+esc(r)+'</button>').join('')+'</span>';
  }
  const foot = (source||related) ? '<div class="foot">'+source+related+'</div>' : '';
  return '<div class="card" id="'+id+'" data-type="'+e.type+'" data-term="'+esc(e.term.toLowerCase())+'">'+
    '<button class="card-head" type="button" aria-expanded="false">'+
      '<span class="card-row"><span class="badge '+e.type+'">'+e.type+'</span>'+
      '<span class="term">'+esc(e.term)+'</span>'+
      '<span class="chev">'+iconChev()+'</span></span>'+
      '<p class="essence">'+esc(e.essence)+'</p>'+
    '</button>'+
    '<div class="detail">'+details+prov+foot+'</div>'+
  '</div>';
}
function areaHTML(area){
  const entries = area.entries.map(entryHTML).join('');
  return '<section class="area" id="area-'+area.id+'">'+
    '<div class="area-head"><h2 class="area-title">'+esc(area.name)+'</h2>'+
      '<span class="area-count">'+area.entries.length+'</span></div>'+
    '<div class="glance"><span class="eyebrow">At a glance</span><p>'+esc(area.glance)+'</p></div>'+
    entries+'</section>';
}
$('#main').innerHTML = DATA.topicAreas.map(areaHTML).join('') + '<div class="empty" id="noRes" style="display:none">No entries match this filter.</div>';

/* topic nav */
$('#topicnav').innerHTML = DATA.topicAreas.map(a=>
  '<a href="#area-'+a.id+'" data-nav="area-'+a.id+'">'+esc(a.name)+'</a>'
).join('');

/* ---- expand / collapse ---- */
$('#main').addEventListener('click', e=>{
  const head = e.target.closest('.card-head');
  if(head){
    const card = head.closest('.card');
    const open = card.hasAttribute('open');
    if(open){card.removeAttribute('open'); head.setAttribute('aria-expanded','false');}
    else{card.setAttribute('open',''); head.setAttribute('aria-expanded','true');}
    return;
  }
  const copy = e.target.closest('.copybtn');
  if(copy){
    const code = copy.parentElement.querySelector('code').textContent;
    navigator.clipboard?.writeText(code).then(()=>{const t=copy.textContent;copy.textContent='copied';setTimeout(()=>copy.textContent=t,1200);}).catch(()=>{});
    return;
  }
  const jump = e.target.closest('[data-jump]');
  if(jump){ jumpTo(jump.getAttribute('data-jump')); }
});

function jumpTo(id){
  const card = document.getElementById(id);
  if(!card) return;
  clearSearch();
  setFilter('all');
  if(!card.hasAttribute('open')){card.setAttribute('open',''); card.querySelector('.card-head').setAttribute('aria-expanded','true');}
  card.scrollIntoView({behavior:'smooth', block:'center'});
  card.classList.remove('flash'); void card.offsetWidth; card.classList.add('flash');
}

/* ---- filters ---- */
let filter = 'all';
function setFilter(f){
  filter = f;
  $$('.chip').forEach(c=>c.setAttribute('aria-pressed', c.dataset.f===f ? 'true':'false'));
  applyFilter();
}
function $$(s){return [...document.querySelectorAll(s)];}
function applyFilter(){
  let anyVisible=false;
  DATA.topicAreas.forEach(area=>{
    const sec = document.getElementById('area-'+area.id);
    let shown=0;
    sec.querySelectorAll('.card').forEach(card=>{
      const ok = filter==='all' ? true : card.dataset.type===filter;
      card.style.display = ok ? '' : 'none';
      if(ok) shown++;
    });
    sec.style.display = shown ? '' : 'none';
    if(shown) anyVisible=true;
  });
  $('#noRes').style.display = anyVisible ? 'none' : 'block';
}
$('#filters').addEventListener('click', e=>{const c=e.target.closest('.chip'); if(c) setFilter(c.dataset.f);});

/* ---- search ---- */
const qEl = $('#q'), sbar=$('#sbar'), resBox=$('#results'), clearBtn=$('#clearBtn');
function subseq(q,t){let i=0;for(const ch of t){if(ch===q[i])i++;if(i===q.length)return true;}return q.length===0;}
function bodyText(e){
  let s=e.essence+' ';
  (e.detail||[]).forEach(f=>{s+=(f.label||'')+' '+(f.body||'')+' '+(f.code||'')+' '; if(f.rows) f.rows.forEach(r=>s+=r.join(' ')+' '); if(f.facts) f.facts.forEach(p=>s+=p.join(' ')+' '); if(f.chain) f.chain.forEach(n=>s+=(typeof n==='string'?n:n.name+' '+(n.role||''))+' ');});
  return s.toLowerCase();
}
function score(e,q){
  const term=e.term.toLowerCase(), al=(e.aliases||[]).map(a=>a.toLowerCase()), ess=e.essence.toLowerCase(), body=bodyText(e);
  let s=0;
  if(term===q)s+=1000; else if(term.startsWith(q))s+=620; else if(term.includes(q))s+=420; else if(subseq(q,term))s+=150;
  for(const a of al){ if(a===q)s+=520; else if(a.startsWith(q))s+=320; else if(a.includes(q))s+=210; }
  if(ess.includes(q))s+=120;
  if(body.includes(q))s+=60;
  const toks=q.split(/\s+/).filter(Boolean);
  if(toks.length>1){const hay=term+' '+al.join(' ')+' '+body; if(toks.every(t=>hay.includes(t)))s+=220;}
  return s;
}
function hl(text,q){
  const t=esc(text); if(!q) return t;
  const i=text.toLowerCase().indexOf(q); if(i<0) return t;
  return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length));
}
let activeIdx=-1, curResults=[];
function runSearch(){
  const raw=qEl.value.trim(), q=raw.toLowerCase();
  sbar.classList.toggle('has-q', raw.length>0);
  if(!q){ resBox.classList.remove('open'); resBox.innerHTML=''; curResults=[]; return; }
  const scored=ALL.map(e=>({e,s:score(e,q)})).filter(x=>x.s>0).sort((a,b)=>b.s-a.s).slice(0,12);
  curResults=scored; activeIdx=-1;
  if(!scored.length){ resBox.innerHTML='<div class="r-hint">No matches. Try a shorter or different term.</div>'; resBox.classList.add('open'); return; }
  resBox.innerHTML=scored.map((x,i)=>{
    const e=x.e;
    return '<button class="result" role="option" data-i="'+i+'" data-term="'+esc(slug(e.term))+'">'+
      '<span class="r-top"><span class="badge '+e.type+'">'+e.type+'</span>'+
      '<span class="r-term">'+hl(e.term,q)+'</span></span>'+
      '<span class="r-ess">'+hl(e.essence,q)+'</span></button>';
  }).join('');
  resBox.classList.add('open');
}
resBox.addEventListener('click',e=>{const r=e.target.closest('.result'); if(r) jumpTo(r.dataset.term);});
qEl.addEventListener('input', runSearch);
function clearSearch(){ qEl.value=''; sbar.classList.remove('has-q'); resBox.classList.remove('open'); resBox.innerHTML=''; curResults=[]; }
clearBtn.addEventListener('click',()=>{clearSearch(); qEl.focus();});
qEl.addEventListener('keydown',e=>{
  if(e.key==='Escape'){clearSearch(); qEl.blur();}
  else if(e.key==='Enter'){ if(curResults.length){ const pick=activeIdx>=0?activeIdx:0; jumpTo(slug(curResults[pick].e.term)); } }
  else if(e.key==='ArrowDown'||e.key==='ArrowUp'){
    e.preventDefault(); if(!curResults.length) return;
    activeIdx=(activeIdx+(e.key==='ArrowDown'?1:-1)+curResults.length)%curResults.length;
    $$('.result').forEach((el,i)=>el.classList.toggle('active',i===activeIdx));
    $$('.result')[activeIdx]?.scrollIntoView({block:'nearest'});
  }
});
document.addEventListener('keydown',e=>{
  if(e.key==='/' && document.activeElement!==qEl && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)){ e.preventDefault(); qEl.focus(); }
});
document.addEventListener('click',e=>{ if(!e.target.closest('.searchwrap')) resBox.classList.remove('open'); });

/* ---- index sheet toggle ---- */
/* ---- topic nav + scrollspy ---- */
const navLinks = $$('#topicnav a');
const areaEls = DATA.topicAreas.map(a=>document.getElementById('area-'+a.id));
let activeArea=null;
function setActiveNav(id){
  if(id===activeArea) return; activeArea=id;
  navLinks.forEach(a=>{
    const on=a.dataset.nav===id; a.classList.toggle('active',on);
    if(on){ const nav=$('#topicnav'); nav.scrollTo({left:a.offsetLeft - nav.clientWidth/2 + a.offsetWidth/2, behavior:'smooth'}); }
  });
}
function updateSpy(){
  const probe = ($('.top').offsetHeight||0) + 20;
  let current=null;
  areaEls.forEach(el=>{ if(el && el.style.display!=='none' && el.getBoundingClientRect().top - probe <= 0) current=el.id; });
  if(!current){ const first=areaEls.find(el=>el && el.style.display!=='none'); if(first) current=first.id; }
  if(current) setActiveNav(current);
}
let spyTick=false;
addEventListener('scroll',()=>{ if(spyTick) return; spyTick=true; requestAnimationFrame(()=>{updateSpy(); spyTick=false;}); },{passive:true});
$('#topicnav').addEventListener('click',e=>{ const a=e.target.closest('a'); if(a) setActiveNav(a.dataset.nav); });
updateSpy();

/* ---- theme ---- */
const root=document.documentElement, themeBtn=$('#themeBtn'), moon=$('#ic-moon'), sun=$('#ic-sun');
function applyTheme(t){ root.setAttribute('data-theme',t); const dark=t==='dark'; moon.style.display=dark?'none':'block'; sun.style.display=dark?'block':'none'; try{localStorage.setItem('javaref-theme',t);}catch(_){} }
(function initTheme(){ let t='light'; try{t=localStorage.getItem('javaref-theme')||'light';}catch(_){} applyTheme(t); })();
themeBtn.addEventListener('click',()=>applyTheme(root.getAttribute('data-theme')==='dark'?'light':'dark'));

/* ---- back to top ---- */
const toTop=$('#toTop');
addEventListener('scroll',()=>{ toTop.classList.toggle('show', scrollY>600); }, {passive:true});
toTop.addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));
</script>
