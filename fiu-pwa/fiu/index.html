<style>
:root{

  --font-sans:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
  --font-mono:ui-monospace,"SF Mono",SFMono-Regular,Menlo,"Cascadia Code","Roboto Mono",monospace;

}
html[data-theme="dark"]{
  --bg:#0F1216; --surface:#171B21; --surface-2:#1E232B; --border:#2A303A;
  --ink:#E7EAEF; --ink-2:#A4ACB8; --ink-3:#727B88;
  --accent:#33AEBD; --accent-ink:#7FD3DD; --accent-soft:#16323A; --accent-line:#26525C;
  --q:#E0B36A; --q-ink:#EBCB8E; --q-soft:#2E2413; --q-line:#5A481F;
  --good:#7FD3A0; --good-soft:#16301F;
  --mark:#5A4C1E;
  --shadow:0 1px 2px rgba(0,0,0,.3), 0 8px 24px rgba(0,0,0,.28);
}
*{box-sizing:border-box}
html,body{margin:0;padding:0}
body{background:var(--bg); color:var(--ink); font-family:var(--font-sans);
  font-size:16px; line-height:1.55; -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility;
  padding-bottom:env(safe-area-inset-bottom);}
a{color:var(--accent-ink); text-decoration:none}
mark{background:var(--mark); color:inherit; border-radius:2px; padding:0 .5px}

/* top bar */
.top{position:sticky; top:0; z-index:40;
  background:color-mix(in srgb, var(--bg) 88%, transparent);
  backdrop-filter:saturate(1.4) blur(10px); -webkit-backdrop-filter:saturate(1.4) blur(10px);
  border-bottom:1px solid var(--border); padding:calc(env(safe-area-inset-top) + 10px) 16px 10px;}
.top-inner{max-width:var(--maxw); margin:0 auto; display:flex; flex-direction:column; gap:10px}
.brand{display:flex; align-items:center; justify-content:space-between; gap:12px}
.wordmark{display:flex; flex-direction:column; line-height:1.15; min-width:0}
.wordmark .n{font-family:var(--font-mono); font-weight:600; font-size:16px; letter-spacing:-.2px}
.wordmark .n b{color:var(--accent-ink); font-weight:700}
.wordmark .s{font-size:11px; color:var(--ink-3); letter-spacing:.2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis}
.iconbtn{appearance:none; border:1px solid var(--border); background:var(--surface); color:var(--ink-2);
  width:38px; height:38px; border-radius:10px; display:grid; place-items:center; cursor:pointer;
  flex:0 0 auto; transition:border-color .15s, color .15s;}
.iconbtn:hover{color:var(--ink); border-color:var(--accent-line)}
.iconbtn svg{width:18px; height:18px; display:block}
.tools{display:flex; gap:8px}

.searchwrap{position:relative}
.searchbar{display:flex; align-items:center; gap:9px; background:var(--surface); border:1px solid var(--border);

.searchbar:focus-within{border-color:var(--accent); box-shadow:0 0 0 3px var(--accent-soft)}
.searchbar svg{width:18px; height:18px; color:var(--ink-3); flex:0 0 auto}
.searchbar input{border:0; outline:0; background:transparent; color:var(--ink);

.searchbar input::placeholder{color:var(--ink-3)}

.glance p{margin:0; font-size:14px; line-height:1.6; color:var(--ink)}

.copybtn{position:absolute; top:7px; right:7px; appearance:none; cursor:pointer; border:1px solid var(--border);
  background:var(--surface); color:var(--ink-3); font-family:var(--font-mono); font-size:10px; letter-spacing:.4px;
  padding:3px 7px; border-radius:6px; opacity:.65; transition:.15s;}
.copybtn:hover{opacity:1; color:var(--ink)}
.tablewrap{margin-top:6px; overflow-x:auto; border:1px solid var(--border); border-radius:9px; -webkit-overflow-scrolling:touch}
table.ref{border-collapse:collapse; width:100%; font-size:12.5px}
table.ref th,table.ref td{text-align:left; padding:7px 11px; border-bottom:1px solid var(--border); white-space:nowrap}
table.ref thead th{font-family:var(--font-mono); font-size:9.5px; font-weight:600; letter-spacing:.6px; text-transform:uppercase; color:var(--ink-3); background:var(--surface-2)}
table.ref tbody tr:last-child td{border-bottom:0}
table.ref td{color:var(--ink-2)}
table.ref td:first-child{font-family:var(--font-mono); font-weight:600; color:var(--ink)}
@media (max-width:560px){
  .tablewrap{border:0; overflow:visible}
  table.ref{font-size:13px}
  table.ref thead{position:absolute; width:1px; height:1px; overflow:hidden; clip:rect(0 0 0 0)}
  table.ref, table.ref tbody, table.ref tr, table.ref td{display:block; width:100%}
  table.ref tr{border:1px solid var(--border); border-radius:9px; background:var(--surface); padding:9px 11px; margin-bottom:8px}
  table.ref td{border:0; padding:0}
  table.ref td:first-child{padding-bottom:6px; margin-bottom:6px; border-bottom:1px solid var(--border); font-size:14px; white-space:normal}
  table.ref td:not(:first-child){display:grid; grid-template-columns:6.5em 1fr; gap:10px; padding:2px 0}
  table.ref td:not(:first-child)::before{content:attr(data-label); font-family:var(--font-mono); font-size:10px; font-weight:600; letter-spacing:.4px; text-transform:uppercase; color:var(--ink-3); align-self:center}
}
.facts{display:grid; grid-template-columns:minmax(0,max-content) 1fr; column-gap:14px; row-gap:6px; margin-top:6px}
.facts dt{font-family:var(--font-mono); font-size:13px; font-weight:600; color:var(--ink); white-space:nowrap; line-height:1.5}
.facts dd{font-size:14px; line-height:1.45; color:var(--ink-2)}
@media (max-width:480px){ .facts{grid-template-columns:1fr; row-gap:2px} .facts dt{margin-top:6px} .facts dt:first-of-type{margin-top:0} }

/* questions */
.qhead{display:flex; align-items:center; gap:9px; margin:22px 2px 10px; padding-top:6px}
.qhead .qh-title{font-family:var(--font-mono); font-size:12.5px; font-weight:700; letter-spacing:.6px; text-transform:uppercase; color:var(--q-ink)}
.qhead .qh-line{flex:1; height:1px; background:var(--q-line)}
.qhead .qh-count{font-family:var(--font-mono); font-size:11px; color:var(--ink-3)}
.qcard{background:var(--surface); border:1px solid var(--border); border-left:3px solid var(--q-line);
  border-radius:10px; margin-bottom:9px; padding:12px 14px; box-shadow:var(--shadow); scroll-margin-top:210px; transition:border-color .18s}
.qcard.flash{border-color:var(--q); animation:qflash 1.4s ease}
@keyframes qflash{0%{box-shadow:0 0 0 3px var(--q-soft)}100%{box-shadow:var(--shadow)}}
.q-q{font-size:14.5px; line-height:1.55; color:var(--ink); font-weight:600}
.q-code{margin-top:8px}
.q-opts{list-style:none; margin:8px 0 0; padding:0; display:flex; flex-direction:column; gap:4px}
.q-opts li{font-size:13px; color:var(--ink-2); font-family:var(--font-mono); padding:3px 8px; border:1px solid var(--border); border-radius:6px}
.q-ans{margin-top:9px; background:var(--good-soft); border:1px solid var(--good); border-radius:8px; padding:8px 11px}
.q-ans .lbl{font-family:var(--font-mono); font-size:9.5px; font-weight:700; letter-spacing:.7px; text-transform:uppercase; color:var(--good); display:block; margin-bottom:3px}
.q-ans .val{font-size:13.5px; line-height:1.5; color:var(--ink); font-weight:600; white-space:pre-wrap; font-family:var(--font-sans)}
.q-ans .val.mono{font-family:var(--font-mono); font-size:12.5px; font-weight:500}
.q-why{margin-top:7px; font-size:12.5px; line-height:1.5; color:var(--ink-2)}
.q-why b{color:var(--ink-3); font-family:var(--font-mono); font-size:10px; letter-spacing:.5px; text-transform:uppercase; font-weight:700; margin-right:4px}
.q-flag{margin-top:7px; font-size:12.5px; line-height:1.5; color:var(--q-ink); background:var(--q-soft); border:1px solid var(--q-line); border-radius:7px; padding:7px 10px}
.q-flag b{font-family:var(--font-mono); font-size:10px; letter-spacing:.5px; text-transform:uppercase; margin-right:4px}
.q-src{margin-top:7px; font-family:var(--font-mono); font-size:10.5px; color:var(--ink-3)}

.foot{display:flex; flex-wrap:wrap; gap:8px 14px; align-items:center; margin-top:14px; padding-top:12px; border-top:1px solid var(--border)}
.related{display:flex; flex-wrap:wrap; gap:6px; align-items:center}
.related .rl{font-family:var(--font-mono); font-size:10px; letter-spacing:.4px; color:var(--ink-3); text-transform:uppercase; margin-right:2px}
.rel{appearance:none; cursor:pointer; border:1px solid var(--border); background:var(--surface-2); color:var(--ink-2);
  font-family:var(--font-mono); font-size:11px; padding:3px 8px; border-radius:999px; transition:.15s}
.rel:hover{color:var(--accent-ink); border-color:var(--accent-line)}
.empty{text-align:center; color:var(--ink-3); padding:50px 20px; font-size:14px}
.ttop{position:fixed; right:16px; bottom:calc(16px + env(safe-area-inset-bottom)); z-index:30;
  width:44px; height:44px; border-radius:50%; border:1px solid var(--border); background:var(--surface);
  color:var(--ink-2); display:none; place-items:center; cursor:pointer; box-shadow:var(--shadow)}
.ttop.show{display:grid}
.ttop svg{width:20px;height:20px}
.pagenote{max-width:var(--maxw); margin:0 auto; padding:0 16px; font-size:11.5px; color:var(--ink-3); line-height:1.5}
@media (prefers-reduced-motion:reduce){*{transition:none!important; animation:none!important}}
</style>
</head>
<body>
<header class="top">
  <div class="top-inner">
    <div class="brand">
      <div class="wordmark"><span class="n" id="wm"></span><span class="s" id="ws"></span></div>
      <div class="tools">
        <button class="iconbtn" id="themeBtn" aria-label="Toggle dark mode">
          <svg id="ic-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.8A9 9 0 1 1 11.2 3a7 7 0 0 0 9.8 9.8Z"/></svg>
          <svg id="ic-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.9 4.9l1.4 1.4M17.7 17.7l1.4 1.4M2 12h2M20 12h2M4.9 19.1l1.4-1.4M17.7 6.3l1.4-1.4"/></svg>
        </button>
      </div>
    </div>
    <div class="searchwrap">
      <div class="searchbar" id="sbar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
        <input id="q" type="search" inputmode="search" autocomplete="off" autocapitalize="off" spellcheck="false" placeholder="Search concepts, syntax, or questions…" aria-label="Search the reference">
        <span class="kbd">/</span>
        <button class="clearbtn" id="clearBtn" aria-label="Clear search"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 6 6 18M6 6l12 12"/></svg></button>
      </div>
      <div class="results" id="results" role="listbox"></div>
    </div>
    <div class="filters" id="filters">
      <button class="chip" data-f="all" aria-pressed="true">All</button>
      <button class="chip" data-f="concept" aria-pressed="false"><span class="dot concept"></span>Concept</button>
      <button class="chip" data-f="syntax" aria-pressed="false"><span class="dot syntax"></span>Syntax</button>
      <button class="chip" data-f="question" aria-pressed="false"><span class="dot question"></span>Questions</button>
    </div>
    <nav class="topicnav" id="topicnav" aria-label="Topic areas"></nav>
  </div>
</header>
<main id="main"></main>
<div class="pagenote" id="pagenote"></div>
<button class="ttop" id="toTop" aria-label="Back to top"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m18 15-6-6-6 6"/></svg></button>
<script>
"use strict";
const DATA = JSON.parse(document.getElementById('refdata').textContent);
const $ = (s,r=document)=>r.querySelector(s);
const $$ = s => [...document.querySelectorAll(s)];
const esc = s => String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
$('#wm').innerHTML = 'COP2210<b>Ref</b>';
$('#ws').textContent = DATA.meta.subtitle || '';

const slug = t => String(t).toLowerCase().replace(/[^a-z0-9]+/g,'-').replace(/(^-|-$)/g,'');
const ALL=[];   // entries
const ALLQ=[];  // questions
DATA.topicAreas.forEach(area=>{
  (area.entries||[]).forEach(e=> ALL.push({...e, areaId:area.id, areaName:area.name}));
  (area.questions||[]).forEach((q,i)=> ALLQ.push({...q, areaId:area.id, areaName:area.name, qid:'q-'+area.id+'-'+i}));
});

function iconChev(){return '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg>';}
function tableHTML(f){
  const head='<thead><tr>'+f.columns.map(c=>'<th>'+esc(c)+'</th>').join('')+'</tr></thead>';
  const body='<tbody>'+(f.rows||[]).map(r=>'<tr>'+r.map((c,i)=>'<td'+(i?' data-label="'+esc(f.columns[i])+'"':'')+'>'+esc(c)+'</td>').join('')+'</tr>').join('')+'</tbody>';
  return '<div class="tablewrap"><table class="ref">'+head+body+'</table></div>';
}
function fieldHTML(f){
  if(f.columns) return '<div class="field"><div class="flabel">'+esc(f.label)+'</div>'+tableHTML(f)+'</div>';
  if(f.facts){ const rows=f.facts.map(p=>'<dt>'+esc(p[0])+'</dt><dd>'+esc(p[1])+'</dd>').join('');
    return '<div class="field"><div class="flabel">'+esc(f.label)+'</div><dl class="facts">'+rows+'</dl></div>'; }
  if(f.code!==undefined) return '<div class="field"><div class="flabel">'+esc(f.label)+'</div><pre><button class="copybtn" type="button">copy</button><code>'+esc(f.code)+'</code></pre></div>';
  return '<div class="field"><div class="flabel">'+esc(f.label)+'</div><div class="fbody">'+esc(f.body)+'</div></div>';
}
function entryHTML(e){
  const id=slug(e.term);
  const details=(e.detail||[]).map(fieldHTML).join('');
  let related='';
  if(e.related&&e.related.length) related='<span class="related"><span class="rl">See also</span>'+
    e.related.map(r=>'<button class="rel" type="button" data-jump="'+esc(slug(r))+'">'+esc(r)+'</button>').join('')+'</span>';
  const foot=related?'<div class="foot">'+related+'</div>':'';
  return '<div class="card" id="'+id+'" data-kind="entry" data-type="'+e.type+'" data-term="'+esc(e.term.toLowerCase())+'">'+
    '<button class="card-head" type="button" aria-expanded="false"><span class="card-row">'+
    '<span class="badge '+e.type+'">'+e.type+'</span><span class="term">'+esc(e.term)+'</span>'+
    '<span class="chev">'+iconChev()+'</span></span><p class="essence">'+esc(e.essence)+'</p></button>'+
    '<div class="detail">'+details+foot+'</div></div>';
}
function questionHTML(q,i,areaId){
  const id='q-'+areaId+'-'+i;
  let code=q.code?'<div class="q-code"><pre><button class="copybtn" type="button">copy</button><code>'+esc(q.code)+'</code></pre></div>':'';
  let opts=q.options?'<ul class="q-opts">'+q.options.map(o=>'<li>'+esc(o)+'</li>').join('')+'</ul>':'';
  const mono = /[{}();]|System\.|for ?\(|while ?\(|\bint\b|\bdouble\b|\breturn\b|\.get\(|\.add\(|\.set\(/.test(q.a) && q.a.length>16;
  let ans='<div class="q-ans"><span class="lbl">Answer</span><span class="val'+(mono?' mono':'')+'">'+esc(q.a)+'</span></div>';
  let why=q.why?'<div class="q-why"><b>Why</b>'+esc(q.why)+'</div>':'';
  let flag=q.flag?'<div class="q-flag"><b>Flag</b>'+esc(q.flag)+'</div>':'';
  let src=q.src?'<div class="q-src">'+esc(q.src)+'</div>':'';
  return '<div class="qcard" id="'+id+'" data-kind="question"><div class="q-q">'+esc(q.q)+'</div>'+code+opts+ans+why+flag+src+'</div>';
}
function areaHTML(area){
  const entries=(area.entries||[]).map(entryHTML).join('');
  const qs=(area.questions||[]);
  const qblock = qs.length? '<div class="qhead"><span class="qh-title">Questions</span><span class="qh-line"></span><span class="qh-count">'+qs.length+'</span></div>'+
    qs.map((q,i)=>questionHTML(q,i,area.id)).join('') : '';
  const counts=[]; if((area.entries||[]).length)counts.push((area.entries||[]).length+' entries'); if(qs.length)counts.push(qs.length+' Q');
  return '<section class="area" id="area-'+area.id+'"><div class="area-head"><h2 class="area-title">'+esc(area.name)+'</h2>'+
    '<span class="area-count">'+counts.join(' · ')+'</span></div>'+
    '<div class="glance"><span class="eyebrow">At a glance</span><p>'+esc(area.glance)+'</p></div>'+
    entries+qblock+'</section>';
}
$('#main').innerHTML = DATA.topicAreas.map(areaHTML).join('') + '<div class="empty" id="noRes" style="display:none">Nothing matches this filter.</div>';
$('#topicnav').innerHTML = DATA.topicAreas.map(a=>'<a href="#area-'+a.id+'" data-nav="area-'+a.id+'">'+esc(a.name)+'</a>').join('');
$('#pagenote').textContent = (DATA.meta.questionNote||'') + '  ' + (DATA.meta.coverage||'');

/* expand / copy / jump */
$('#main').addEventListener('click', e=>{
  const head=e.target.closest('.card-head');
  if(head){ const card=head.closest('.card'); const open=card.hasAttribute('open');
    if(open){card.removeAttribute('open'); head.setAttribute('aria-expanded','false');}
    else{card.setAttribute('open',''); head.setAttribute('aria-expanded','true');} return; }
  const copy=e.target.closest('.copybtn');
  if(copy){ const code=copy.parentElement.querySelector('code').textContent;
    navigator.clipboard?.writeText(code).then(()=>{const t=copy.textContent;copy.textContent='copied';setTimeout(()=>copy.textContent=t,1200);}).catch(()=>{}); return; }
  const jump=e.target.closest('[data-jump]'); if(jump) jumpTo(jump.getAttribute('data-jump'));
});
function jumpTo(id){
  const el=document.getElementById(id); if(!el) return;
  clearSearch(); setFilter('all');
  if(el.classList.contains('card') && !el.hasAttribute('open')){ el.setAttribute('open',''); el.querySelector('.card-head').setAttribute('aria-expanded','true'); }
  el.scrollIntoView({behavior:'smooth', block:'center'});
  el.classList.remove('flash'); void el.offsetWidth; el.classList.add('flash');
}

/* filters */
let filter='all';
function setFilter(f){ filter=f; $$('.chip').forEach(c=>c.setAttribute('aria-pressed', c.dataset.f===f?'true':'false')); applyFilter(); }
function applyFilter(){
  let anyVisible=false;
  DATA.topicAreas.forEach(area=>{
    const sec=document.getElementById('area-'+area.id); let shown=0;
    sec.querySelectorAll('.card').forEach(card=>{ const ok=(filter==='all')||(filter!=='question'&&card.dataset.type===filter); card.style.display=ok?'':'none'; if(ok)shown++; });
    const showQ = (filter==='all'||filter==='question');
    sec.querySelectorAll('.qcard').forEach(qc=>{ qc.style.display=showQ?'':'none'; if(showQ)shown++; });
    const qh=sec.querySelector('.qhead'); if(qh) qh.style.display=showQ?'':'none';
    sec.style.display=shown?'':'none'; if(shown)anyVisible=true;
  });
  $('#noRes').style.display=anyVisible?'none':'block';
}
$('#filters').addEventListener('click', e=>{const c=e.target.closest('.chip'); if(c) setFilter(c.dataset.f);});

/* search: entries + questions */
const qEl=$('#q'), sbar=$('#sbar'), resBox=$('#results'), clearBtn=$('#clearBtn');
function subseq(q,t){let i=0;for(const ch of t){if(ch===q[i])i++;if(i===q.length)return true;}return q.length===0;}
function bodyText(e){ let s=e.essence+' '; (e.detail||[]).forEach(f=>{s+=(f.label||'')+' '+(f.body||'')+' '+(f.code||'')+' '; if(f.rows)f.rows.forEach(r=>s+=r.join(' ')+' '); if(f.facts)f.facts.forEach(p=>s+=p.join(' ')+' ');}); return s.toLowerCase(); }
function scoreE(e,q){ const term=e.term.toLowerCase(), al=(e.aliases||[]).map(a=>a.toLowerCase()), ess=e.essence.toLowerCase(), body=bodyText(e); let s=0;
  if(term===q)s+=1000; else if(term.startsWith(q))s+=620; else if(term.includes(q))s+=420; else if(subseq(q,term))s+=140;
  for(const a of al){ if(a===q)s+=520; else if(a.startsWith(q))s+=300; else if(a.includes(q))s+=200; }
  if(ess.includes(q))s+=120; if(body.includes(q))s+=55; return s; }
function scoreQ(q,term){ const hay=(q.q+' '+(q.a||'')+' '+(q.code||'')+' '+(q.why||'')+' '+(q.src||'')).toLowerCase(); let s=0; if(hay.includes(term))s+=200; if(q.q.toLowerCase().includes(term))s+=120; return s; }
function hl(text,q){ const t=esc(text); if(!q)return t; const i=text.toLowerCase().indexOf(q); if(i<0)return t; return esc(text.slice(0,i))+'<mark>'+esc(text.slice(i,i+q.length))+'</mark>'+esc(text.slice(i+q.length)); }
let activeIdx=-1, curResults=[];
function runSearch(){
  const raw=qEl.value.trim(), q=raw.toLowerCase(); sbar.classList.toggle('has-q', raw.length>0);
  if(!q){ resBox.classList.remove('open'); resBox.innerHTML=''; curResults=[]; return; }
  const eHits=ALL.map(e=>({kind:'e',o:e,s:scoreE(e,q)})).filter(x=>x.s>0);
  const qHits=ALLQ.map(o=>({kind:'q',o,s:scoreQ(o,q)})).filter(x=>x.s>0);
  const scored=eHits.concat(qHits).sort((a,b)=>b.s-a.s).slice(0,12);
  curResults=scored; activeIdx=-1;
  if(!scored.length){ resBox.innerHTML='<div class="r-hint">No matches. Try a shorter term.</div>'; resBox.classList.add('open'); return; }
  resBox.innerHTML=scored.map((x,i)=>{
    if(x.kind==='e'){ const e=x.o; return '<button class="result" role="option" data-i="'+i+'" data-jump="'+esc(slug(e.term))+'">'+
      '<span class="r-top"><span class="badge '+e.type+'">'+e.type+'</span><span class="r-term">'+hl(e.term,q)+'</span></span>'+
      '<span class="r-ess">'+hl(e.essence,q)+'</span></button>'; }
    const o=x.o; return '<button class="result" role="option" data-i="'+i+'" data-jump="'+esc(o.qid)+'">'+
      '<span class="r-top"><span class="badge question">Q · '+esc(o.areaName)+'</span></span>'+
      '<span class="r-ess">'+hl(o.q,q)+'</span></button>';
  }).join('');
  resBox.classList.add('open');
}
resBox.addEventListener('click',e=>{const r=e.target.closest('.result'); if(r) jumpTo(r.dataset.jump);});
qEl.addEventListener('input', runSearch);
function clearSearch(){ qEl.value=''; sbar.classList.remove('has-q'); resBox.classList.remove('open'); resBox.innerHTML=''; curResults=[]; }
clearBtn.addEventListener('click',()=>{clearSearch(); qEl.focus();});
qEl.addEventListener('keydown',e=>{
  if(e.key==='Escape'){clearSearch(); qEl.blur();}
  else if(e.key==='Enter'){ if(curResults.length){ const pick=activeIdx>=0?activeIdx:0; jumpTo(curResults[pick].kind==='e'?slug(curResults[pick].o.term):curResults[pick].o.qid); } }
  else if(e.key==='ArrowDown'||e.key==='ArrowUp'){ e.preventDefault(); if(!curResults.length)return;
    activeIdx=(activeIdx+(e.key==='ArrowDown'?1:-1)+curResults.length)%curResults.length;
    $$('.result').forEach((el,i)=>el.classList.toggle('active',i===activeIdx)); $$('.result')[activeIdx]?.scrollIntoView({block:'nearest'}); }
});
document.addEventListener('keydown',e=>{ if(e.key==='/' && document.activeElement!==qEl && !/^(INPUT|TEXTAREA)$/.test(document.activeElement.tagName)){ e.preventDefault(); qEl.focus(); } });
document.addEventListener('click',e=>{ if(!e.target.closest('.searchwrap')) resBox.classList.remove('open'); });

/* scrollspy */
const navLinks=$$('#topicnav a');
const areaEls=DATA.topicAreas.map(a=>document.getElementById('area-'+a.id));
let activeArea=null;
function setActiveNav(id){ if(id===activeArea)return; activeArea=id;
  navLinks.forEach(a=>{ const on=a.dataset.nav===id; a.classList.toggle('active',on);
    if(on){ const nav=$('#topicnav'); nav.scrollTo({left:a.offsetLeft - nav.clientWidth/2 + a.offsetWidth/2, behavior:'smooth'}); } }); }
function updateSpy(){ const probe=($('.top').offsetHeight||0)+20; let current=null;
  areaEls.forEach(el=>{ if(el && el.style.display!=='none' && el.getBoundingClientRect().top - probe<=0) current=el.id; });
  if(!current){ const first=areaEls.find(el=>el && el.style.display!=='none'); if(first)current=first.id; }
  if(current) setActiveNav(current); }
let spyTick=false;
addEventListener('scroll',()=>{ if(spyTick)return; spyTick=true; requestAnimationFrame(()=>{updateSpy(); spyTick=false;}); },{passive:true});
$('#topicnav').addEventListener('click',e=>{ const a=e.target.closest('a'); if(a) setActiveNav(a.dataset.nav); });
updateSpy();

/* theme */
const root=document.documentElement, themeBtn=$('#themeBtn'), moon=$('#ic-moon'), sun=$('#ic-sun');
function applyTheme(t){ root.setAttribute('data-theme',t); const dark=t==='dark'; moon.style.display=dark?'none':'block'; sun.style.display=dark?'block':'none'; try{localStorage.setItem('fiuref-theme',t);}catch(_){} }
(function(){ let t='light'; try{t=localStorage.getItem('fiuref-theme')||'light';}catch(_){} applyTheme(t); })();
themeBtn.addEventListener('click',()=>applyTheme(root.getAttribute('data-theme')==='dark'?'light':'dark'));

/* back to top */
const toTop=$('#toTop');
addEventListener('scroll',()=>{ toTop.classList.toggle('show', scrollY>600); }, {passive:true});
toTop.addEventListener('click',()=>scrollTo({top:0,behavior:'smooth'}));

/* register service worker (subfolder-scoped) */
if('serviceWorker' in navigator){ window.addEventListener('load',()=>{ navigator.serviceWorker.register('./sw.js').catch(()=>{}); }); }
</script>
</body>
</html>
